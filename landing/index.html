<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UKDL · 지식을 코드처럼 구조화하라</title>
  <meta name="description" content="UKDL(Unified Knowledge & Dynamics Language) — AI 에이전트를 위한 통합 지식 표현 언어. Markdown만큼 쉽게 쓰고, 그래프만큼 정확하게 질의하고, 프로그램처럼 실행하세요.">
  <meta property="og:title" content="UKDL · 지식을 코드처럼 구조화하라">
  <meta property="og:description" content="AI 에이전트를 위한 통합 지식 표현 언어. L0→L5 Progressive Disclosure.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles-sections.css">

  <script>
    (function () {
      try {
        var stored = JSON.parse(localStorage.getItem('ukdl-tweaks') || '{}');
        if (stored && stored.theme) {
          document.documentElement.setAttribute('data-theme', stored.theme);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root">
    <noscript>
      <div style="max-width:640px;margin:80px auto;padding:24px;text-align:center;font-family:system-ui,sans-serif">
        <h1 style="font-size:28px;margin:0 0 12px">UKDL</h1>
        <p>이 페이지는 JavaScript가 활성화되어야 정상적으로 표시됩니다.</p>
        <p><a href="https://github.com/Reasonofmoon/ukld-spec">GitHub 저장소 바로가기 →</a></p>
      </div>
    </noscript>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="samples.js"></script>
  <script type="text/babel" data-presets="react" src="app-part1.jsx"></script>
  <script type="text/babel" data-presets="react" src="app-part2.jsx"></script>
  <script type="text/babel" data-presets="react" src="app-part3.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAK_DEFAULTS = { theme: 'light', defaultLevel: 1 };

    function App() {
      const { useState, useEffect } = React;
      const stored = (() => {
        try { return JSON.parse(localStorage.getItem('ukdl-tweaks') || '{}'); }
        catch (e) { return {}; }
      })();

      const [theme, setTheme] = useState(stored.theme || TWEAK_DEFAULTS.theme);
      const [defaultLevel, setDefaultLevel] = useState(
        stored.defaultLevel ?? TWEAK_DEFAULTS.defaultLevel
      );
      const [tweaksOpen, setTweaksOpen] = useState(false);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('ukdl-tweaks', JSON.stringify({ theme, defaultLevel }));
      }, [theme, defaultLevel]);

      return (
        <>
          <window.Nav theme={theme} setTheme={setTheme}
            onOpenTweaks={() => setTweaksOpen(true)} />
          <window.Hero />
          <window.Laws />
          <window.Levels key={defaultLevel} initialLevel={defaultLevel} />
          <window.Compare />
          <window.KnowledgeGraph />
          <window.UseCases />
          <window.Install />
          <window.Roadmap />
          <window.Footer />

          <button
            onClick={() => setTweaksOpen(v => !v)}
            aria-label="Open tweaks"
            style={{
              position: 'fixed', right: 20, bottom: 20, zIndex: 99,
              width: 44, height: 44, borderRadius: '50%',
              background: 'var(--primary)', color: 'white',
              display: tweaksOpen ? 'none' : 'grid', placeItems: 'center',
              boxShadow: 'var(--shadow-mint)', cursor: 'pointer'
            }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"
              strokeLinejoin="round">
              <path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/>
            </svg>
          </button>

          <window.TweaksPanel open={tweaksOpen}
            onClose={() => setTweaksOpen(false)}
            theme={theme} setTheme={setTheme}
            defaultLevel={defaultLevel} setDefaultLevel={setDefaultLevel}/>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
